<!doctype html>

<title>happySenior 教學工具</title>
<style>
:root{--ink:#163c3e;--teal:#168f92;--yellow:#ffbd2e;--cream:#fff9ee;--line:#dce3db}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 10%,#ffbd2e35,transparent 30%),var(--cream);color:var(--ink);font-family:Arial,"Microsoft JhengHei",sans-serif}.wrap{width:min(760px,calc(100% - 28px));margin:auto;padding:42px 0}.hero{text-align:center}.logo{width:112px;height:112px;object-fit:contain;background:#fff;border-radius:25px;box-shadow:0 12px 30px #1c4f4d18}.hero h1{margin:16px 0 6px;font-size:clamp(2rem,7vw,3.2rem)}.hero p{margin:0;color:#687777;font-size:1.05rem}.tools{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:34px}.tool{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 18px;border:1px solid var(--line);border-radius:25px;background:#fffffff2;box-shadow:0 14px 35px #1c4f4d14;text-align:center;text-decoration:none;color:var(--ink);transition:.18s}.tool:hover,.tool:focus-visible{transform:translateY(-4px);outline:3px solid #168f9230}.icon{display:grid;place-items:center;width:76px;height:76px;border-radius:22px;background:var(--teal);color:#fff;font-size:2.3rem}.tool:nth-child(2) .icon{background:var(--yellow);color:#704700}.tool h2{margin:0;font-size:1.35rem}.tool span{color:#687777}.note{margin-top:28px;padding:15px;border-radius:15px;background:#fff8dc;text-align:center;color:#704700}@media(max-width:560px){.wrap{padding:28px 0}.tools{grid-template-columns:1fr}.tool{padding:22px}.logo{width:92px;height:92px}}

</head>

<main class="wrap">
<header class="hero"><img class="logo" src="../public/chen-yufong-logo.png" alt="銀髮族友善標誌"><h1>happySenior</h1><p>銀髮族教學工具入口</p></header>
<nav class="tools" aria-label="教學工具">

<a class="tool" href="./Rhythm/Rhythm.html"><i class="icon" aria-hidden="true">拍</i><h2>拍手節奏工具</h2><span>36 種聲音與節奏播放</span></a>
</nav>
<p class="note">陳裕豐（順豐）・銀髮族友善教學</p>
</main>
</body>
