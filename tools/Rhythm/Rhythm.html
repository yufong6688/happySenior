<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>happySenior 拍手節奏編輯器</title>
<style>
:root{--ink:#163c3e;--muted:#687777;--cream:#fff9ee;--teal:#168f92;--dark:#0e696c;--coral:#ff6c52;--yellow:#ffbd2e;--green:#83b94c;--line:#dce3db}
*{box-sizing:border-box}html{background:var(--cream)}body{margin:0;background:radial-gradient(circle at 8% 8%,#ffbd2e28,transparent 28%),radial-gradient(circle at 92% 15%,#168f9220,transparent 28%),var(--cream);color:var(--ink);font-family:Arial,"Microsoft JhengHei",sans-serif}button,input,select,textarea{font:inherit}button{touch-action:manipulation}.app{width:min(1180px,calc(100% - 28px));margin:auto;padding:20px 0 40px}.card{background:#fffffff2;border:1px solid var(--line);box-shadow:0 14px 40px #1c4f4d16}
.profile{position:relative;display:grid;grid-template-columns:minmax(310px,.58fr) minmax(0,1fr) 42px;gap:24px;padding:20px 24px;border-radius:27px;align-items:start}.identity{display:flex;align-items:center;gap:17px;min-width:0}.logo{width:132px;height:132px;object-fit:contain;background:#fff;border-radius:27px}.kicker{color:var(--teal);font-size:1.15rem;font-weight:900}.identity h1{margin:6px 0 0;font-size:2rem;white-space:nowrap}.toggle{width:38px;height:38px;border:1px solid var(--line);border-radius:50%;background:#fff;color:var(--dark);font-size:1.4rem;font-weight:900;cursor:pointer}.modules{padding-top:2px}.module{display:flex;align-items:baseline;gap:9px;line-height:1.25;padding:2px 0}.module span{display:grid;place-items:center;flex:none;width:24px;height:24px;border-radius:8px;background:var(--yellow);font-weight:900}.module-select{display:none;grid-column:1/3}.module-select select{width:100%;min-height:48px;padding:8px 12px;border:2px solid var(--line);border-radius:13px;background:#fff;font-weight:800}.profile.compact{grid-template-columns:1fr 42px}.profile.compact .identity .logo{width:100px;height:100px}.profile.compact .modules{display:none}.profile.compact .module-select{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:15px;margin:22px 0 14px}.topbar h2{margin:0;font-size:clamp(1.5rem,4vw,2.35rem)}.status-dot{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#fff;border:1px solid var(--line);border-radius:999px;font-weight:900}.status-dot i{width:11px;height:11px;border-radius:50%;background:#aab5b5}.status-dot.on i{background:var(--green);box-shadow:0 0 0 6px #83b94c2d}
.hero{display:grid;grid-template-columns:.9fr 1.35fr;gap:20px}.stage{min-height:385px;padding:24px;border-radius:31px;background:linear-gradient(145deg,#0e777a,#16a0a1);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden}.stage.rest{background:linear-gradient(145deg,#e95f48,#ff826b)}.symbol{font-size:clamp(7rem,18vw,11rem);font-weight:1000;line-height:.95;margin:10px 0;text-shadow:0 8px #0002}.stage.playing .symbol{animation:pulse .55s ease-in-out infinite alternate}@keyframes pulse{to{transform:scale(1.08)}}.stage h3{margin:0;font-size:1.45rem}.stage p{min-height:24px}.progress{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}.progress span{display:grid;place-items:center;min-width:31px;height:31px;padding:0 6px;border-radius:9px;background:#ffffff29;font-weight:900}.progress .now{background:var(--yellow);color:#684700;transform:translateY(-3px)}
.playlist{padding:27px;border-radius:31px}.playlist-head{display:flex;justify-content:space-between;align-items:end}.playlist h3{margin:4px 0 0;font-size:1.5rem}.badge{padding:5px 9px;border-radius:999px;background:#eaf7f3;color:var(--dark);font-size:.8rem;font-weight:900}.group-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}.group-tabs button{padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-weight:900;cursor:pointer}.group-tabs .active{background:var(--teal);color:#fff;border-color:var(--teal)}.group-list{display:grid;gap:4px;max-height:210px;overflow:auto}.row{display:grid;grid-template-columns:26px minmax(68px,max-content) minmax(0,1fr) auto;gap:8px;align-items:center;padding:6px 8px;border:2px solid transparent;border-radius:11px;background:#f4f7f1}.row.current{border-color:var(--yellow);background:#fff8dc}.row>span{display:grid;place-items:center;width:24px;height:24px;border-radius:8px;background:#fff;font-weight:900}.row code{color:var(--coral);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}.summary div{padding:12px 5px;border-radius:14px;background:#f4f7f1;text-align:center}.summary small,.summary b{display:block}.summary small{color:var(--muted)}.actions{display:grid;grid-template-columns:1.45fr 1fr;gap:10px}.actions button{min-height:56px;border:0;border-radius:16px;font-weight:900;cursor:pointer}.start{background:var(--coral);color:#fff;box-shadow:0 7px #c94f3d}.stop{background:#edf1ed;color:var(--ink)}button:disabled{opacity:.45;box-shadow:none}
.editor{margin-top:20px;border-radius:24px;overflow:hidden}.editor summary{display:flex;justify-content:space-between;gap:15px;padding:20px 23px;cursor:pointer;font-weight:900}.editor summary small{display:block;margin-top:5px;color:var(--muted);font-weight:500}.editor-tools{display:flex;flex-wrap:wrap;gap:8px;padding:16px 20px 0}.editor-tools button,.filebtn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:8px 12px;border:1px solid var(--line);border-radius:11px;background:#fff;font-weight:900;cursor:pointer}.filebtn input,.music input{position:absolute;width:1px;height:1px;opacity:0}.apply{background:var(--teal)!important;color:#fff}.editor textarea{display:block;width:calc(100% - 40px);min-height:360px;margin:14px 20px 20px;padding:16px;border:2px solid #29484a;border-radius:15px;background:#132d2f;color:#eafff7;font:700 .93rem/1.55 Consolas,"Microsoft JhengHei",monospace;resize:vertical}
.settings{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}.panel{padding:23px;border-radius:24px}.panel h3{margin:0 0 17px}.line{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-weight:900}.line b{color:var(--dark)}input[type=range]{width:100%;accent-color:var(--teal)}input[type=number]{width:100%;min-height:46px;padding:8px 12px;border:2px solid var(--line);border-radius:12px}.music{display:flex;align-items:center;padding:17px;border:2px dashed #b9ccc4;border-radius:17px;background:#f7faf6;cursor:pointer;font-weight:900}.sounds{margin-top:20px;padding:24px;border-radius:27px}.sounds h3{margin:0 0 16px}.sound-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}.sound-grid button{min-height:72px;border:1px solid var(--line);border-radius:14px;background:#f8faf7;color:var(--dark);font-size:1.3rem;font-weight:1000;cursor:pointer}.sound-grid button:hover{background:#eaf7f3;transform:translateY(-2px)}footer{text-align:center;padding:28px 0 2px;color:var(--muted);font-weight:800}
@media(max-width:850px){.profile{grid-template-columns:1fr 42px}.modules{grid-column:1/3}.hero,.settings{grid-template-columns:1fr}.sound-grid{grid-template-columns:repeat(6,1fr)}}
@media(max-width:560px){.app{width:calc(100% - 18px);padding-top:9px}.profile{padding:15px;gap:10px}.logo,.profile.compact .identity .logo{width:85px;height:85px}.kicker{font-size:.9rem}.identity h1{font-size:1.45rem}.topbar{align-items:flex-start}.status-dot{font-size:.8rem;padding:7px 9px}.stage{min-height:300px;border-radius:23px}.playlist{padding:18px 13px}.row{font-size:.8rem;grid-template-columns:23px minmax(55px,max-content) minmax(0,1fr) auto;gap:5px}.sound-grid{grid-template-columns:repeat(4,1fr)}.editor-tools{display:grid;grid-template-columns:1fr 1fr}.editor textarea{width:calc(100% - 24px);margin:12px;min-height:430px;font-size:.8rem}}
</style>
</head>
<body>
<main class="app">
<section id="profile" class="profile card">
  <div class="identity"><img class="logo" src="https://raw.githubusercontent.com/yufong6688/happySenior/main/public/chen-yufong-logo.png" alt="銀髮族友善標誌"><div><div class="kicker">模組老師</div><h1 id="teacher">陳裕豐（順豐）</h1></div></div>
  <div id="modules" class="modules"></div>
  <button id="profileToggle" class="toggle" title="隱藏基本資料">⌃</button>
  <div class="module-select"><select id="moduleSelect" aria-label="選擇目前模組"></select></div>
</section>
<div class="topbar"><div><small>happySenior 銀髮族教學工具</small><h2>拍手節奏編輯器</h2></div><div id="statusDot" class="status-dot"><i></i><span>待機中</span></div></div>
<section class="hero">
  <div id="stage" class="stage card"><small id="stageSmall">目前節奏</small><div id="symbol" class="symbol">♪</div><h3 id="groupName">準備開始</h3><p id="status">正在讀取 default.txt…</p><div id="progress" class="progress"></div></div>
  <div class="playlist card"><div class="playlist-head"><div><span id="source" class="badge">default.txt</span><h3>節奏清單</h3></div><b id="groupCount">0 組</b></div><div id="setTabs" class="group-tabs"></div><div id="groupList" class="group-list"></div><div class="summary"><div><small>總循環</small><b id="totalLoopsView">1 次</b></div><div><small>已完成</small><b id="totalDone">0 次</b></div><div><small>本節奏</small><b id="groupDone">0 次</b></div></div><div class="actions"><button id="start" class="start">▶ 開始播放</button><button id="stop" class="stop" disabled>■ 停止</button></div></div>
</section>
<details class="editor card"><summary><span>文字設計檔編輯器<small>可讀取 default.txt 或其他設計檔，修改後套用</small></span><b>點擊展開</b></summary><div class="editor-tools"><label class="filebtn"><input id="designFile" type="file" accept=".txt,text/plain">讀取其他 .txt</label><button id="reload">重新讀取 default.txt</button><button id="save">另存設計檔</button><button id="apply" class="apply">套用文字設定</button></div><textarea id="editor" spellcheck="false" aria-label="節奏設計檔內容"></textarea></details>
<section class="settings">
  <div class="panel card"><h3>1　播放參數</h3><label class="line"><span>節奏速度</span><b id="bpmView">96 BPM</b></label><input id="bpm" type="range" min="40" max="180" value="96"><label class="line"><span>群組總循環次數</span></label><input id="totalLoops" type="number" min="0" value="1"><small>輸入 0 代表無限循環</small><label class="line"><span>樂器音量</span><b id="volumeView">75%</b></label><input id="volume" type="range" min="0" max="100" value="75"></div>
  <div class="panel card"><h3>2　MP3 背景音樂</h3><label class="music"><input id="musicFile" type="file" accept="audio/mp3,audio/mpeg"><span id="musicName">選擇手機或電腦中的 MP3</span></label><label class="line"><span>背景音量</span><b id="musicVolumeView">45%</b></label><input id="musicVolume" type="range" min="0" max="100" value="45"></div>
</section>
<section class="sounds card"><h3>3　36 種樂器聲（點擊可試聽）</h3><div id="soundGrid" class="sound-grid"></div></section>
<footer>陳裕豐（順豐）・happySenior 銀髮族友善教學工具</footer>
</main>
<script>
(function(){
"use strict";
var SYMBOLS="0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
var DEFAULT_TEXT=[
"# happySenior 節奏設計檔",
"# BPM：每分鐘拍數，範圍 40 到 180","BPM=96",
"# TOTAL_LOOPS：目前群組總循環次數，0 代表無限","TOTAL_LOOPS=2",
"# MASTER_VOLUME：樂器音量 0 到 100","MASTER_VOLUME=75",
"# MUSIC_VOLUME：MP3 背景音量 0 到 100","MUSIC_VOLUME=45",
"# INSTRUCTOR：模組老師姓名","INSTRUCTOR=陳裕豐（順豐）",
"# MODULE：顯示的已完成模組；前面加 # 就不顯示",
"MODULE=ＣＬ-０１-０４０７義大養生八段錦",
"MODULE=ＣＬ-０１-０４９２運用中醫多元方式延緩失能（五禽戲）",
"MODULE=ＣＬ-０１-０１４２健體防跌協助員",
"MODULE=ＣＬ-０１-０２６９動動健康班協助員",
"# GROUP_SET：群組按鈕名稱",
"# GROUP：節奏名稱|節奏字串|本節奏循環次數，X 代表休止",
"GROUP_SET=群組1","GROUP=暖身|10XX10XX|2","GROUP=主節奏|AZBXX10|3","GROUP=收尾|1234XXXX|1",
"GROUP_SET=群組2","GROUP=暖身|10XX10XX|2","GROUP=主節奏|AZBXX10|3",
"GROUP_SET=群組3","GROUP=收尾|1234XXXX|1",
"GROUP_SET=群組4","GROUP=收尾|1234XXXX|1",
"GROUP_SET=群組5","GROUP=收尾|1234XXXX|1"
].join("\n");
var config={groups:[],sets:[],bpm:96,totalLoops:2,volume:75,musicVolume:45,instructor:"陳裕豐（順豐）",modules:[]};
var activeSet="群組1",playing=false,timer=null,gi=0,si=0,gl=0,tl=0,ctx=null,audio=null,musicUrl=null;
var $=function(id){return document.getElementById(id)};
function parse(text){
 var c={groups:[],sets:[],bpm:96,totalLoops:1,volume:75,musicVolume:45,instructor:"陳裕豐（順豐）",modules:[]},set="群組1";
 text.split(/\r?\n/).forEach(function(raw){
  var line=raw.trim();if(!line||line.charAt(0)==="#")return;var p=line.indexOf("=");if(p<0)return;
  var k=line.slice(0,p).trim().toUpperCase(),v=line.slice(p+1).trim();
  if(k==="BPM")c.bpm=Math.max(40,Math.min(180,Number(v)||96));
  else if(k==="TOTAL_LOOPS")c.totalLoops=Math.max(0,Number(v)||0);
  else if(k==="MASTER_VOLUME")c.volume=Math.max(0,Math.min(100,Number(v)||0));
  else if(k==="MUSIC_VOLUME")c.musicVolume=Math.max(0,Math.min(100,Number(v)||0));
  else if(k==="INSTRUCTOR")c.instructor=v;
  else if(k==="MODULE")c.modules.push(v);
  else if(k==="GROUP_SET"){set=v||"群組"+(c.sets.length+1);if(c.sets.indexOf(set)<0)c.sets.push(set)}
  else if(k==="GROUP"){var a=v.split("|");if(a.length>=3){var pat=a[1].trim().toUpperCase().replace(/[\s,，、]/g,"");var ok=[].every.call(pat,function(x){return SYMBOLS.indexOf(x)>=0});if(pat&&ok)c.groups.push({name:a[0].trim()||"節奏",raw:pat,seq:pat.split(""),loops:Math.max(0,Number(a[2])||0),set:set})}}
 });
 if(!c.sets.length)c.sets=["群組1"];return c;
}
function groups(){return config.groups.filter(function(g){return g.set===activeSet})}
function updateParam(key,value){var ta=$("editor"),re=new RegExp("^"+key+"\\s*=.*$","mi");ta.value=re.test(ta.value)?ta.value.replace(re,key+"="+value):key+"="+value+"\n"+ta.value;applyText(ta.value,$("source").textContent)}
function applyText(text,label){
 config=parse(text);if(config.sets.indexOf(activeSet)<0)activeSet=config.sets[0];$("editor").value=text;$("source").textContent=label||"文字設定";$("teacher").textContent=config.instructor;
 $("bpm").value=config.bpm;$("bpmView").textContent=config.bpm+" BPM";$("totalLoops").value=config.totalLoops;$("totalLoopsView").textContent=config.totalLoops===0?"無限":config.totalLoops+" 次";$("volume").value=config.volume;$("volumeView").textContent=config.volume+"%";$("musicVolume").value=config.musicVolume;$("musicVolumeView").textContent=config.musicVolume+"%";
 renderProfile();render();$("status").textContent=config.groups.length?"已載入 "+config.groups.length+" 組節奏":"找不到可播放的 GROUP";
}
function renderProfile(){
 $("modules").innerHTML=config.modules.map(function(m,i){return '<div class="module"><span>'+(i+1)+'</span><b>'+escapeHtml(m)+'</b></div>'}).join("");
 $("moduleSelect").innerHTML=config.modules.map(function(m,i){return '<option value="'+i+'">'+escapeHtml(m)+'</option>'}).join("");
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
function render(){
 var gs=groups();if(gi>=gs.length)gi=0;$("setTabs").innerHTML=config.sets.map(function(s){return '<button data-set="'+escapeHtml(s)+'" class="'+(s===activeSet?"active":"")+'">'+escapeHtml(s)+'</button>'}).join("");
 $("groupList").innerHTML=gs.map(function(g,i){return '<div class="row '+(playing&&i===gi?"current":"")+'"><span>'+(i+1)+'</span><b>'+escapeHtml(g.name)+'</b><code>'+g.raw+'</code><small>'+(g.loops===0?"無限":g.loops+"次")+'</small></div>'}).join("");
 $("groupCount").textContent=gs.length+" 組";$("totalDone").textContent=tl+" 次";$("groupDone").textContent=gl+" 次";
 document.querySelectorAll("[data-set]").forEach(function(b){b.onclick=function(){stop("已選擇 "+b.getAttribute("data-set"));activeSet=b.getAttribute("data-set");gi=si=gl=tl=0;render();showStep()}})
}
function audioContext(){if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();if(ctx.state==="suspended")ctx.resume();return ctx}
function sound(sym,preview){
 if(sym==="X"&&!preview)return;var i=SYMBOLS.indexOf(sym);if(i<0)return;var c=audioContext(),now=c.currentTime,g=c.createGain(),family=i%6,base=92+i*17;g.connect(c.destination);g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(Math.max(.025,config.volume/100*.34),now+.008);
 if(family===2){var len=Math.floor(c.sampleRate*.16),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(var n=0;n<len;n++)d[n]=(Math.random()*2-1)*(1-n/len);var src=c.createBufferSource(),f=c.createBiquadFilter();f.type="bandpass";f.frequency.value=650+i*85;src.buffer=buf;src.connect(f);f.connect(g);src.start(now);g.gain.exponentialRampToValueAtTime(.0001,now+.16);return}
 var o=c.createOscillator();o.type=["sine","triangle","square","square","sine","sawtooth"][family];o.frequency.setValueAtTime(base*(family===0?1.4:family===4?3.4:2.1),now);if(family<2)o.frequency.exponentialRampToValueAtTime(Math.max(45,base*.55),now+.18);o.connect(g);o.start(now);var l=family===4?.38:.2;o.stop(now+l);g.gain.exponentialRampToValueAtTime(.0001,now+l-.01)
}
function showStep(){
 var gs=groups(),g=gs[gi];if(!g){$("symbol").textContent="♪";$("groupName").textContent="沒有節奏";$("progress").innerHTML="";return}
 var sym=si>=0?g.seq[si]:"♪";$("symbol").textContent=sym;$("groupName").textContent=g.name;$("stageSmall").textContent="第 "+(gi+1)+" 組";$("stage").classList.toggle("rest",sym==="X");$("progress").innerHTML=g.seq.map(function(x,i){return '<span class="'+(i===si?"now":"")+'">'+x+'</span>'}).join("")
}
function tick(){
 var gs=groups();if(!gs.length)return stop("沒有可播放的節奏");var g=gs[gi],sym=g.seq[si];showStep();$("status").textContent=sym==="X"?"休止一拍":g.name+"：樂器 "+sym;sound(sym,false);si++;
 if(si>=g.seq.length){si=0;gl++;if(g.loops!==0&&gl>=g.loops){gl=0;gi++;if(gi>=gs.length){gi=0;tl++;if(config.totalLoops>0&&tl>=config.totalLoops){setTimeout(function(){stop("全部節奏播放完成")},Math.max(120,30000/config.bpm))}}}}render()
}
function start(){
 if(playing||!groups().length)return;playing=true;gi=si=gl=tl=0;$("start").disabled=true;$("stop").disabled=false;$("stage").classList.add("playing");$("statusDot").classList.add("on");$("statusDot").querySelector("span").textContent="播放中";
 if(audio){audio.currentTime=0;audio.volume=config.musicVolume/100;audio.loop=true;audio.play().catch(function(){})}
 tick();timer=setInterval(tick,Math.round(60000/config.bpm))
}
function stop(msg){
 if(timer)clearInterval(timer);timer=null;playing=false;$("start").disabled=false;$("stop").disabled=true;$("stage").classList.remove("playing");$("statusDot").classList.remove("on");$("statusDot").querySelector("span").textContent="待機中";if(audio){audio.pause();audio.currentTime=0}if(msg)$("status").textContent=msg;si=-1;showStep();render()
}
function loadDefault(){
 fetch("https://raw.githubusercontent.com/yufong6688/happySenior/main/public/default.txt?"+Date.now()).then(function(r){if(!r.ok)throw Error();return r.text()}).then(function(t){applyText(t,"default.txt")}).catch(function(){applyText(DEFAULT_TEXT,"內建 default.txt")})
}
$("profileToggle").onclick=function(){var p=$("profile"),compact=p.classList.toggle("compact");this.textContent=compact?"⌄":"⌃";this.title=compact?"展開基本資料":"隱藏基本資料"};
$("start").onclick=start;$("stop").onclick=function(){stop("已停止播放")};$("apply").onclick=function(){stop("已套用文字設定");applyText($("editor").value,$("source").textContent)};$("reload").onclick=loadDefault;
$("designFile").onchange=function(){var f=this.files&&this.files[0];if(f)f.text().then(function(t){stop();applyText(t,f.name)})};
$("save").onclick=function(){var blob=new Blob([$("editor").value],{type:"text/plain;charset=utf-8"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="happySenior-design.txt";a.click();URL.revokeObjectURL(url)};
$("musicFile").onchange=function(){var f=this.files&&this.files[0];if(!f)return;if(musicUrl)URL.revokeObjectURL(musicUrl);musicUrl=URL.createObjectURL(f);audio=new Audio(musicUrl);$("musicName").textContent=f.name};
$("bpm").oninput=function(){$("bpmView").textContent=this.value+" BPM";updateParam("BPM",this.value);config.bpm=Number(this.value);if(playing){clearInterval(timer);timer=setInterval(tick,Math.round(60000/config.bpm))}};
$("totalLoops").onchange=function(){updateParam("TOTAL_LOOPS",Math.max(0,Number(this.value)));config.totalLoops=Math.max(0,Number(this.value));$("totalLoopsView").textContent=config.totalLoops===0?"無限":config.totalLoops+" 次"};
$("volume").oninput=function(){$("volumeView").textContent=this.value+"%";updateParam("MASTER_VOLUME",this.value);config.volume=Number(this.value)};
$("musicVolume").oninput=function(){$("musicVolumeView").textContent=this.value+"%";updateParam("MUSIC_VOLUME",this.value);config.musicVolume=Number(this.value);if(audio)audio.volume=config.musicVolume/100};
$("soundGrid").innerHTML=SYMBOLS.map(function(s){return '<button data-sound="'+s+'" title="試聽樂器 '+s+'">'+s+'</button>'}).join("");document.querySelectorAll("[data-sound]").forEach(function(b){b.onclick=function(){sound(b.getAttribute("data-sound"),true)}});
loadDefault();
})();
</script>
